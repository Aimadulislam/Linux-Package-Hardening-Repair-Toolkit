# Linux Package Hardening & Repair Toolkit Configuration File
# Location: linux-hardening-toolkit/config/config.conf

# Global Directory Settings
BACKUP_DIR="/var/backups/hardening-toolkit"
LOG_DIR="/var/log/hardening-toolkit"
REPORT_DIR="/var/log/hardening-toolkit/reports"

# Fallback directories for non-root users or local runs
LOCAL_BACKUP_DIR="./backups"
LOCAL_LOG_DIR="./logs"
LOCAL_REPORT_DIR="./reports"

# Notification Configurations
ENABLE_TERMINAL_NOTIFICATIONS=true
ENABLE_DESKTOP_NOTIFICATIONS=false
ENABLE_EMAIL_NOTIFICATIONS=false
NOTIFICATION_EMAIL="root@localhost"

# Style & Aesthetic Settings
USE_COLORS=true
SHOW_PROGRESS_BARS=true
UNICODE_ICONS=true

# Maintenance Defaults
AUTO_REBOOT_ON_KERNEL_UPDATE=false
AUTO_CLEANUP_AFTER_UPGRADE=true
REMOVE_ORPHANS_ON_CLEANUP=true
BACKUP_BEFORE_UPGRADE=true

# Security Settings
DISABLE_SSH_ROOT_LOGIN=true
DISABLE_SSH_WEAK_CIPHERS=true
ENFORCE_STRICT_SYSCTL=true
MIN_UID_FOR_USER_AUDIT=1000

# Scheduler Settings
DEFAULT_SCHEDULER="cron" # 'cron' or 'systemd'
DAILY_MAINTENANCE_TIME="02:00"
WEEKLY_MAINTENANCE_DAY=1 # 1 = Monday, 7 = Sunday
